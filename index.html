<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车库管理系统</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- 左侧菜单 -->
         <div class="sidebar">

            <h2>车库系统</h2>

            <ul>
                <li>首页</li>
                <li>车辆管理</li>
                <li>收费记录</li>
                <li>用户管理</li>
                <li>系统设置</li>
            </ul>

         </div>

         <!-- 右侧内容 -->
          <div class="main">

            <button id = "addBtn">添加车辆</button>

            <input type="text" id = "searchInput" placeholder = "请输入车牌号">

            <button id = "searchBtn">查询</button>

            <table>
                <thead>
                    <tr>
                        <th>车牌号</th>
                        <th>进入时间</th>
                        <th>操作</th>
                    </tr>
                </thead>

                <tbody id = "carTableBody">

                </tbody>
            </table>
          </div>

        <!-- 弹窗 -->
         <div id = "modal" class="modal">
                <div class="modal-content">
                    <h2>添加车辆</h2>

                    <input type="text" id = "carNumberInput" placeholder="请输入车牌号">

                    <input type="text" id = "timeInput" placeholder="请输入进入时间">

                    <div class="modal-buttons">
                        <button id = "confirmBtn">确认</button>

                        <button id = "cancelBtn" class = "delete-btn">取消</button>
                    </div>
                </div>
         </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
